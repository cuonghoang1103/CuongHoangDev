# ===================================
# DEVELOPMENT ENVIRONMENT CONFIG
# ===================================

spring:
  # ===== DATABASE CONFIGURATION =====
  datasource:
    url: jdbc:h2:mem:cuonghoangdev_dev
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        use_sql_comments: true

  # ===== THYMELEAF CONFIGURATION =====
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # ===== DEVTOOLS =====
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/resources/templates,src/main/resources/static
    livereload:
      enabled: true
      port: 35729


  flyway:
    enabled: false

# ===== SERVER CONFIGURATION =====
server:
  port: 8080
  error:
    include-stacktrace: always
    include-message: always

# ===== LOGGING CONFIGURATION =====
logging:
  level:
    root: INFO
    dev.cuonghoang: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.boot.autoconfigure: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

# ===== CUSTOM APPLICATION PROPERTIES =====
app:
  # JWT Configuration (Less secure for development)
  jwt:
    secret: dev-jwt-secret-key-not-for-production
    expiration: 86400000 # 24 hours
    refresh-expiration: 604800000 # 7 days

  # File Upload Configuration
  upload:
    path: uploads/dev/
    max-size: 10485760 # 10MB

  # Admin Configuration
  admin:
    default-username: admin
    default-password: admin123
    default-email: admin@localhost

  # OAuth2 Configuration
  oauth2:
    success-redirect-url: /?oauth2=success&env=dev
    failure-redirect-url: /auth/login?error=oauth2_failed&env=dev

  # Cache Configuration (Disabled for development)
  cache:
    enabled: false
    ttl: 60 # 1 minute for quick testing

  # Development flags
  debug:
    enabled: true
    show-sql-params: true
    log-requests: true

# ===== MANAGEMENT & ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    shutdown:
      enabled: true
  info:
    env:
      enabled: true
    git:
      mode: full
