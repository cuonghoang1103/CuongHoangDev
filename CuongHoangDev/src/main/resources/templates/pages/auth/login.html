<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Cuong Thai</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/modern-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0ea5e9, #d946ef);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-8);
        }
        
        .auth-logo {
            font-size: var(--text-3xl);
            font-weight: 800;
            background: linear-gradient(135deg, #0ea5e9, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-2);
        }
        
        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }
        
        .oauth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-lg);
            background: white;
            color: var(--gray-700);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .oauth-btn:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
            transform: translateY(-1px);
        }
        
        .oauth-btn.google { border-color: #db4437; }
        .oauth-btn.facebook { border-color: #4267b2; }
        .oauth-btn.github { border-color: #333; }
        
        .divider {
            display: flex;
            align-items: center;
            margin: var(--space-6) 0;
            color: var(--gray-500);
            font-size: var(--text-sm);
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--gray-300);
        }
        
        .divider span {
            padding: 0 var(--space-4);
        }
        
        .form-group {
            margin-bottom: var(--space-4);
        }
        
        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-weight: 500;
            color: var(--gray-700);
        }
        
        .form-input {
            width: 100%;
            padding: var(--space-3);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        
        .btn-primary {
            width: 100%;
            padding: var(--space-3);
            background: linear-gradient(135deg, #0ea5e9, #d946ef);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .auth-links {
            text-align: center;
            margin-top: var(--space-6);
        }
        
        .auth-links a {
            color: var(--primary-600);
            text-decoration: none;
            font-size: var(--text-sm);
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: var(--space-3);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
            font-size: var(--text-sm);
        }
        
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .alert-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">Cuong Thai</h1>
                <p class="text-gray-600">Đăng nhập vào hệ thống</p>
            </div>
            
            <!-- Error/Success Messages -->
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            
            <div th:if="${message}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}"></span>
            </div>
            
            <!-- OAuth Login Buttons -->
            <div class="oauth-buttons">
                <a href="/oauth2/authorization/google" class="oauth-btn google">
                    <i class="fab fa-google"></i>
                    Đăng nhập với Google
                </a>
                
                <a href="/oauth2/authorization/facebook" class="oauth-btn facebook">
                    <i class="fab fa-facebook-f"></i>
                    Đăng nhập với Facebook
                </a>
                
                <a href="/oauth2/authorization/github" class="oauth-btn github">
                    <i class="fab fa-github"></i>
                    Đăng nhập với GitHub
                </a>
            </div>
            
            <div class="divider">
                <span>hoặc</span>
            </div>
            
            <!-- Manual Login Form -->
            <form th:action="@{/auth/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-user"></i> Tên đăng nhập hoặc Email
                    </label>
                    <input type="text" id="username" name="username" class="form-input" 
                           placeholder="Nhập tên đăng nhập hoặc email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <input type="password" id="password" name="password" class="form-input" 
                           placeholder="Nhập mật khẩu" required>
                </div>
                
                <div class="form-group">
                    <label class="flex items-center">
                        <input type="checkbox" name="remember-me" class="mr-2">
                        <span class="text-sm text-gray-600">Ghi nhớ đăng nhập</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>
            </form>
            
            <!-- Auth Links -->
            <div class="auth-links">
                <div class="mb-2">
                    <a th:href="@{/auth/forgot-password}">Quên mật khẩu?</a>
                </div>
                <div class="mb-2">
                    <span class="text-gray-600">Chưa có tài khoản? </span>
                    <a th:href="@{/auth/register}">Đăng ký ngay</a>
                </div>
                <div>
                    <a th:href="@{/auth/register-phone}">Đăng ký bằng số điện thoại</a>
                </div>
                <div class="mt-4">
                    <a th:href="@{/}" class="text-gray-500">
                        <i class="fas fa-arrow-left"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-hide alerts after 5 seconds
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-10px)';
                setTimeout(() => alert.remove(), 300);
            });
        }, 5000);
    </script>
</body>
</html>
