<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Cuong Thai</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/modern-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-6);
        }
        
        .auth-logo {
            font-size: var(--text-3xl);
            font-weight: 800;
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-2);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
        }
        
        .form-group {
            margin-bottom: var(--space-4);
        }
        
        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-weight: 500;
            color: var(--gray-700);
            font-size: var(--text-sm);
        }
        
        .form-input {
            width: 100%;
            padding: var(--space-3);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .password-strength {
            margin-top: var(--space-2);
            font-size: var(--text-xs);
        }
        
        .strength-bar {
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: var(--space-1);
        }
        
        .strength-fill {
            height: 100%;
            transition: width 0.3s, background-color 0.3s;
        }
        
        .strength-weak { background: #ef4444; }
        .strength-medium { background: #f59e0b; }
        .strength-strong { background: #10b981; }
        
        .btn-primary {
            width: 100%;
            padding: var(--space-3);
            background: linear-gradient(135deg, #10b981, #0ea5e9);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-links {
            text-align: center;
            margin-top: var(--space-6);
        }
        
        .auth-links a {
            color: var(--primary-600);
            text-decoration: none;
            font-size: var(--text-sm);
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: var(--space-3);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
            font-size: var(--text-sm);
        }
        
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
        }
        
        .terms-checkbox input {
            margin-top: 2px;
        }
        
        .terms-text {
            font-size: var(--text-sm);
            color: var(--gray-600);
            line-height: 1.5;
        }
        
        .terms-text a {
            color: var(--primary-600);
            text-decoration: none;
        }
        
        .terms-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-logo">Cuong Thai</h1>
                <p class="text-gray-600">Tạo tài khoản mới</p>
            </div>
            
            <!-- Error Messages -->
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            
            <!-- Registration Form -->
            <form th:action="@{/auth/register}" method="post" th:object="${user}" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName" class="form-label">
                            <i class="fas fa-user"></i> Họ
                        </label>
                        <input type="text" id="firstName" th:field="*{firstName}" class="form-input" 
                               placeholder="Nhập họ" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName" class="form-label">
                            <i class="fas fa-user"></i> Tên
                        </label>
                        <input type="text" id="lastName" th:field="*{lastName}" class="form-input" 
                               placeholder="Nhập tên" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">
                        <i class="fas fa-at"></i> Tên đăng nhập
                    </label>
                    <input type="text" id="username" th:field="*{username}" class="form-input" 
                           placeholder="Nhập tên đăng nhập" required minlength="3">
                    <div class="text-xs text-gray-500 mt-1">Ít nhất 3 ký tự, chỉ chứa chữ, số và dấu gạch dưới</div>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" th:field="*{email}" class="form-input" 
                           placeholder="Nhập địa chỉ email" required>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <input type="password" id="password" th:field="*{password}" class="form-input" 
                           placeholder="Nhập mật khẩu" required minlength="6">
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div id="strengthText" class="text-xs text-gray-500">
                            Mật khẩu phải có ít nhất 6 ký tự
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword" class="form-label">
                        <i class="fas fa-lock"></i> Xác nhận mật khẩu
                    </label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" 
                           placeholder="Nhập lại mật khẩu" required>
                    <div id="passwordMatch" class="text-xs mt-1"></div>
                </div>
                
                <div class="terms-checkbox">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms" class="terms-text">
                        Tôi đồng ý với 
                        <a href="/terms" target="_blank">Điều khoản sử dụng</a> 
                        và 
                        <a href="/privacy" target="_blank">Chính sách bảo mật</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary" id="submitBtn" disabled>
                    <i class="fas fa-user-plus"></i> Đăng ký
                </button>
            </form>
            
            <!-- Auth Links -->
            <div class="auth-links">
                <div class="mb-2">
                    <span class="text-gray-600">Đã có tài khoản? </span>
                    <a th:href="@{/auth/login}">Đăng nhập ngay</a>
                </div>
                <div class="mb-2">
                    <a th:href="@{/auth/register-phone}">Đăng ký bằng số điện thoại</a>
                </div>
                <div class="mt-4">
                    <a th:href="@{/}" class="text-gray-500">
                        <i class="fas fa-arrow-left"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const passwordMatch = document.getElementById('passwordMatch');
        const agreeTerms = document.getElementById('agreeTerms');
        const submitBtn = document.getElementById('submitBtn');
        
        // Password strength checker
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            const strength = calculatePasswordStrength(password);
            
            updatePasswordStrength(strength);
            checkPasswordMatch();
            updateSubmitButton();
        });
        
        confirmPasswordInput.addEventListener('input', function() {
            checkPasswordMatch();
            updateSubmitButton();
        });
        
        agreeTerms.addEventListener('change', updateSubmitButton);
        
        function calculatePasswordStrength(password) {
            let score = 0;
            
            if (password.length >= 6) score += 1;
            if (password.length >= 8) score += 1;
            if (/[a-z]/.test(password)) score += 1;
            if (/[A-Z]/.test(password)) score += 1;
            if (/[0-9]/.test(password)) score += 1;
            if (/[^A-Za-z0-9]/.test(password)) score += 1;
            
            return Math.min(score, 3);
        }
        
        function updatePasswordStrength(strength) {
            const strengthClasses = ['strength-weak', 'strength-medium', 'strength-strong'];
            const strengthTexts = [
                'Mật khẩu yếu',
                'Mật khẩu trung bình', 
                'Mật khẩu mạnh'
            ];
            
            strengthFill.className = 'strength-fill';
            if (strength > 0) {
                strengthFill.classList.add(strengthClasses[strength - 1]);
                strengthFill.style.width = (strength * 33.33) + '%';
                strengthText.textContent = strengthTexts[strength - 1];
                strengthText.className = 'text-xs ' + (strength === 3 ? 'text-green-600' : strength === 2 ? 'text-yellow-600' : 'text-red-600');
            } else {
                strengthFill.style.width = '0%';
                strengthText.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                strengthText.className = 'text-xs text-gray-500';
            }
        }
        
        function checkPasswordMatch() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (confirmPassword === '') {
                passwordMatch.textContent = '';
                passwordMatch.className = 'text-xs mt-1';
            } else if (password === confirmPassword) {
                passwordMatch.textContent = '✓ Mật khẩu khớp';
                passwordMatch.className = 'text-xs mt-1 text-green-600';
            } else {
                passwordMatch.textContent = '✗ Mật khẩu không khớp';
                passwordMatch.className = 'text-xs mt-1 text-red-600';
            }
        }
        
        function updateSubmitButton() {
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            const termsChecked = agreeTerms.checked;
            
            const isValid = password.length >= 6 && 
                           password === confirmPassword && 
                           termsChecked;
            
            submitBtn.disabled = !isValid;
        }
        
        // Auto-hide alerts after 5 seconds
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-10px)';
                setTimeout(() => alert.remove(), 300);
            });
        }, 5000);
    </script>
</body>
</html>
