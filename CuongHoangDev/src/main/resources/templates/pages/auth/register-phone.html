<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký bằng SĐT - Cuong Thai</title>
    <link rel="stylesheet" th:href="@{/css/design-system.css}">
    <link rel="stylesheet" th:href="@{/css/modern-layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #f59e0b, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-4);
        }
        
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: var(--space-6);
        }
        
        .auth-logo {
            font-size: var(--text-3xl);
            font-weight: 800;
            background: linear-gradient(135deg, #f59e0b, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: var(--space-2);
        }
        
        .phone-icon {
            font-size: var(--text-4xl);
            color: var(--primary-500);
            margin-bottom: var(--space-4);
        }
        
        .form-group {
            margin-bottom: var(--space-4);
        }
        
        .form-label {
            display: block;
            margin-bottom: var(--space-2);
            font-weight: 500;
            color: var(--gray-700);
            font-size: var(--text-sm);
        }
        
        .form-input {
            width: 100%;
            padding: var(--space-3);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: var(--text-base);
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        
        .phone-input-group {
            display: flex;
            gap: var(--space-2);
        }
        
        .country-code {
            flex-shrink: 0;
            width: 80px;
            background: var(--gray-50);
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            text-align: center;
            font-weight: 500;
        }
        
        .btn-primary {
            width: 100%;
            padding: var(--space-3);
            background: linear-gradient(135deg, #f59e0b, #10b981);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        
        .auth-links {
            text-align: center;
            margin-top: var(--space-6);
        }
        
        .auth-links a {
            color: var(--primary-600);
            text-decoration: none;
            font-size: var(--text-sm);
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .alert {
            padding: var(--space-3);
            border-radius: var(--radius-md);
            margin-bottom: var(--space-4);
            font-size: var(--text-sm);
        }
        
        .alert-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .info-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: var(--radius-md);
            padding: var(--space-4);
            margin-bottom: var(--space-4);
        }
        
        .info-box h4 {
            color: #0369a1;
            font-weight: 600;
            margin-bottom: var(--space-2);
        }
        
        .info-box ul {
            color: #0369a1;
            font-size: var(--text-sm);
            margin-left: var(--space-4);
        }
        
        .info-box li {
            margin-bottom: var(--space-1);
        }
        
        .phone-format-help {
            font-size: var(--text-xs);
            color: var(--gray-500);
            margin-top: var(--space-1);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="phone-icon">
                    <i class="fas fa-mobile-alt"></i>
                </div>
                <h1 class="auth-logo">Cuong Thai</h1>
                <p class="text-gray-600">Đăng ký bằng số điện thoại</p>
            </div>
            
            <!-- Info Box -->
            <div class="info-box">
                <h4><i class="fas fa-info-circle"></i> Đăng ký nhanh chóng</h4>
                <ul>
                    <li>Xác thực bằng mã SMS</li>
                    <li>Không cần nhớ mật khẩu</li>
                    <li>Bảo mật cao với OTP</li>
                </ul>
            </div>
            
            <!-- Error Messages -->
            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            
            <!-- Phone Registration Form -->
            <form th:action="@{/auth/register-phone}" method="post" id="phoneForm">
                <div class="form-group">
                    <label for="firstName" class="form-label">
                        <i class="fas fa-user"></i> Họ
                    </label>
                    <input type="text" id="firstName" name="firstName" class="form-input" 
                           placeholder="Nhập họ của bạn" required>
                </div>
                
                <div class="form-group">
                    <label for="lastName" class="form-label">
                        <i class="fas fa-user"></i> Tên
                    </label>
                    <input type="text" id="lastName" name="lastName" class="form-input" 
                           placeholder="Nhập tên của bạn" required>
                </div>
                
                <div class="form-group">
                    <label for="phoneNumber" class="form-label">
                        <i class="fas fa-phone"></i> Số điện thoại
                    </label>
                    <div class="phone-input-group">
                        <div class="country-code">+84</div>
                        <input type="tel" id="phoneNumber" name="phoneNumber" class="form-input" 
                               placeholder="Nhập số điện thoại" required pattern="[0-9]{9,10}">
                    </div>
                    <div class="phone-format-help">
                        Ví dụ: 0123456789 hoặc 123456789 (không cần +84)
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sms"></i> Gửi mã xác thực
                </button>
            </form>
            
            <!-- Auth Links -->
            <div class="auth-links">
                <div class="mb-2">
                    <span class="text-gray-600">Đã có tài khoản? </span>
                    <a th:href="@{/auth/login}">Đăng nhập ngay</a>
                </div>
                <div class="mb-2">
                    <a th:href="@{/auth/register}">Đăng ký bằng email</a>
                </div>
                <div class="mt-4">
                    <a th:href="@{/}" class="text-gray-500">
                        <i class="fas fa-arrow-left"></i> Về trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const phoneInput = document.getElementById('phoneNumber');
        const phoneForm = document.getElementById('phoneForm');
        
        // Format phone number input
        phoneInput.addEventListener('input', function() {
            let value = this.value.replace(/\D/g, ''); // Remove non-digits
            
            // Remove leading 0 if present
            if (value.startsWith('0')) {
                value = value.substring(1);
            }
            
            // Limit to 10 digits
            if (value.length > 10) {
                value = value.substring(0, 10);
            }
            
            this.value = value;
        });
        
        // Validate form before submit
        phoneForm.addEventListener('submit', function(e) {
            const phoneNumber = phoneInput.value;
            
            if (phoneNumber.length < 9 || phoneNumber.length > 10) {
                e.preventDefault();
                alert('Số điện thoại phải có 9-10 chữ số');
                return false;
            }
            
            // Add +84 prefix for submission
            const fullPhoneNumber = '+84' + phoneNumber;
            phoneInput.value = fullPhoneNumber;
        });
        
        // Auto-hide alerts after 5 seconds
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.opacity = '0';
                alert.style.transform = 'translateY(-10px)';
                setTimeout(() => alert.remove(), 300);
            });
        }, 5000);
    </script>
</body>
</html>
