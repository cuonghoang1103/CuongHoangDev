<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <!-- SEO Meta Tags -->
    <title th:text="${pageTitle != null ? pageTitle + ' - CuongHoangDev' : 'CuongHoangDev - Full-stack Developer'}">CuongHoangDev - Full-stack Developer</title>
    <meta name="description" th:content="${pageDescription != null ? pageDescription : 'Professional Portfolio Website by Cuong Hoang - Full-stack Developer specializing in Java Spring Boot, React, and modern web technologies'}">
    <meta name="keywords" content="Cuong Hoang, Full-stack Developer, Java, Spring Boot, React, Portfolio, Web Development">
    <meta name="author" content="Cuong Hoang">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" th:content="${pageTitle != null ? pageTitle + ' - CuongHoangDev' : 'CuongHoangDev - Full-stack Developer'}">
    <meta property="og:description" th:content="${pageDescription != null ? pageDescription : 'Professional Portfolio Website by Cuong Hoang'}">
    <meta property="og:type" content="website">
    <meta property="og:url" th:content="@{/}">
    <meta property="og:image" content="/img/og-image.jpg">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">

    <!-- CSS Dependencies -->
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- Custom CSS Files -->
    <link th:href="@{/css/main.css}" rel="stylesheet">
    <link th:href="@{/css/sidebar.css}" rel="stylesheet">
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/components.css}" rel="stylesheet">
    <link th:href="@{/css/modern-layout.css}" rel="stylesheet">
    <link th:href="@{/css/responsive.css}" rel="stylesheet">
    <link th:href="@{/css/animations.css}" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Additional CSS -->
    <th:block layout:fragment="css">
        <!-- Page specific CSS will be inserted here -->
    </th:block>
</head>
<body class="sidebar-layout">

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner">
        <div class="spinner-border text-primary" role="alert" aria-live="assertive">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Header Fragment -->
    <div th:replace="~{layout/header :: header}"></div>

    <!-- Sidebar Fragment -->
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <!-- Main Content Wrapper -->
    <div id="content-wrapper" class="content-wrapper">
        <!-- Main Content Area -->
        <main class="main-content">
            <div class="container-fluid">
                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${warningMessage}" class="alert alert-warning alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span th:text="${warningMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${infoMessage}" class="alert alert-info alert-dismissible fade show" role="alert">
                    <i class="fas fa-info-circle"></i>
                    <span th:text="${infoMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Page Content -->
                <div class="page-content">
                    <th:block layout:fragment="content">
                        <!-- Page specific content will be inserted here -->
                    </th:block>
                </div>
            </div>
        </main>
    </div>

    <!-- Footer Fragment -->
    <div th:replace="~{layout/footer :: footer}"></div>

    <!-- Sidebar Overlay for Mobile -->
    <div id="sidebarOverlay" class="sidebar-overlay d-md-none"></div>

    <!-- JavaScript Dependencies -->
    <!-- Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- AOS Animation -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JavaScript -->
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/sidebar.js}"></script>

    <!-- Additional JavaScript -->
    <th:block layout:fragment="scripts">
        <!-- Page specific scripts will be inserted here -->
    </th:block>

    <!-- Initialize AOS -->
    <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true
        });
    </script>
</body>
</html>
