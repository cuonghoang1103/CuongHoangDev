name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/backend-vps.yml'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /opt/cuonghoangdev

            # ALWAYS backup database before any deployment
            if docker exec cuonghoangdev_postgres psql -U postgres -lqt | cut -d \| -f 1 | grep -qw cuonghoangdev_db; then
              echo "Backing up database before deployment..."
              mkdir -p /opt/cuonghoangdev/backups
              DATE=$(date +%Y%m%d_%H%M%S)
              docker exec cuonghoangdev_postgres pg_dump -U postgres cuonghoangdev_db | gzip > /opt/cuonghoangdev/backups/${DATE}_backup.sql.gz
              echo "Backup saved: ${DATE}_backup.sql.gz"
            fi

            # Stop containers and remove old ones
            docker compose -f docker-compose.yml down --remove-orphans 2>/dev/null || true
            docker rm -f cuonghoangdev_postgres cuonghoangdev_redis cuonghoangdev_backend cuonghoangdev_frontend cuonghoangdev_nginx 2>/dev/null || true

            # Clean Redis and uploads ONLY (never touch postgres data)
            rm -rf /opt/cuonghoangdev/redis/* /opt/cuonghoangdev/uploads/* 2>/dev/null || true

            # Build and start all services
            docker compose -f docker-compose.yml up -d --build

            # Wait for services to be healthy
            sleep 15

            # Show status
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=50 backend
            docker compose -f docker-compose.yml logs --tail=20 frontend
          '

      - name: Create admin user on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /opt/cuonghoangdev

            # Wait for backend to be ready
            for i in $(seq 1 30); do
              if docker exec cuonghoangdev_backend wget -q -O- http://localhost:3001/health 2>/dev/null | grep -q "ok"; then
                echo "Backend is ready"
                break
              fi
              echo "Waiting for backend... ($i)"
              sleep 2
            done

            # Run seed script (copied by rsync)
            if [ -f /opt/cuonghoangdev/scripts/seed-admin.js ]; then
              docker cp /opt/cuonghoangdev/scripts/seed-admin.js cuonghoangdev_backend:/app/seed-admin.js
              docker exec cuonghoangdev_backend node seed-admin.js
              echo "Admin user setup done"
            else
              echo "Warning: seed-admin.js not found, skipping admin creation"
            fi
          '

      - name: Setup backup cron on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            mkdir -p /opt/cuonghoangdev/backups

            # Copy scripts to /opt if not already synced
            if [ -f /opt/cuonghoangdev/scripts/backup-cron.sh ]; then
              chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh
              chmod +x /opt/cuonghoangdev/scripts/restore-db.sh
            else
              echo "Warning: scripts not found in rsync, skipping"
            fi

            # Setup cron (backup daily at 2 AM)
            (crontab -l 2>/dev/null | grep -v backup-cron; echo "0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1") | crontab -

            echo "=== Cron entries ==="
            crontab -l
            echo "===================="
          '
