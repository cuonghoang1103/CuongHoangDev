name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile.backend'
      - 'docker-compose.yml'
      - 'frontend/**'
      - 'nginx/**'
      - 'scripts/**'
      - '.github/workflows/backend-vps.yml'
      - '.dockerignore'
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/.next' \
            --exclude 'bin' \
            --exclude 'postgres' \
            --exclude 'redis' \
            --exclude 'uploads' \
            --exclude 'backups' \
            --exclude '*.log' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/cuonghoangdev/"

      - name: Deploy on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /opt/cuonghoangdev

            # ALWAYS backup database before any deployment
            if docker exec cuonghoangdev_postgres psql -U postgres -lqt | cut -d \| -f 1 | grep -qw cuonghoangdev_db; then
              echo "Backing up database before deployment..."
              mkdir -p /opt/cuonghoangdev/backups
              DATE=$(date +%Y%m%d_%H%M%S)
              docker exec cuonghoangdev_postgres pg_dump -U postgres cuonghoangdev_db | gzip > /opt/cuonghoangdev/backups/${DATE}_backup.sql.gz
              echo "Backup saved: ${DATE}_backup.sql.gz"
            fi

            # Stop containers and remove old ones
            docker compose -f docker-compose.yml down --remove-orphans 2>/dev/null || true
            docker rm -f cuonghoangdev_postgres cuonghoangdev_redis cuonghoangdev_backend cuonghoangdev_frontend cuonghoangdev_nginx 2>/dev/null || true

            # Clean Redis and uploads ONLY (never touch postgres data)
            rm -rf /opt/cuonghoangdev/redis/* /opt/cuonghoangdev/uploads/* 2>/dev/null || true

            # Build and start all services
            docker compose -f docker-compose.yml up -d --build

            # Wait for services to be healthy
            sleep 15

            # Show status
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=50 backend
            docker compose -f docker-compose.yml logs --tail=20 frontend
          '

      - name: Create admin user on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            cd /opt/cuonghoangdev

            # Wait for backend to be ready
            for i in {1..30}; do
              if docker exec cuonghoangdev_backend wget -q -O- http://localhost:3001/health 2>/dev/null | grep -q "ok"; then
                echo "Backend is ready"
                break
              fi
              echo "Waiting for backend... ($i)"
              sleep 2
            done

            # Create admin seed script
            mkdir -p /opt/cuonghoangdev/scripts
            cat > /opt/cuonghoangdev/scripts/seed-admin.js << "SEEDEOF"
const { PrismaClient } = require("@prisma/client");
const prisma = new PrismaClient();
async function main() {
  let adminRole = await prisma.role.findUnique({ where: { name: "ADMIN" } });
  if (!adminRole) {
    adminRole = await prisma.role.create({ data: { name: "ADMIN" } });
    console.log("Created ADMIN role");
  } else {
    console.log("ADMIN role already exists");
  }
  const email = "cuonghoang1103@gmail.com";
  const existing = await prisma.user.findUnique({ where: { email } });
  if (existing) {
    await prisma.user.update({ where: { email }, data: { password: "Cuong123@", username: "Cuong03dx" } });
    const ur = await prisma.userRole.findUnique({ where: { userId_roleId: { userId: existing.id, roleId: adminRole.id } } });
    if (!ur) await prisma.userRole.create({ data: { userId: existing.id, roleId: adminRole.id } });
    console.log("Updated admin: Cuong03dx / Cuong123@");
  } else {
    const user = await prisma.user.create({
      data: {
        username: "Cuong03dx",
        email,
        password: "Cuong123@",
        fullName: "Admin",
        enabled: true,
        accountNonExpired: true,
        accountNonLocked: true,
        credentialsNonExpired: true,
        provider: "local",
        roles: { create: { roleId: adminRole.id } }
      }
    });
    console.log("Created admin: Cuong03dx / Cuong123@ (ID: " + user.id + ")");
  }
}
main().catch(e => { console.error(e.message); process.exit(1); }).finally(() => prisma.$disconnect());
SEEDEOF

            # Run seed
            docker cp /opt/cuonghoangdev/scripts/seed-admin.js cuonghoangdev_backend:/app/seed-admin.js
            docker exec cuonghoangdev_backend node seed-admin.js
            echo "Admin user created successfully"
          '

      - name: Setup backup cron on VPS
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
            set -e
            mkdir -p /opt/cuonghoangdev/backups /opt/cuonghoangdev/scripts

            # Create backup script
            cat > /opt/cuonghoangdev/scripts/backup-cron.sh << "BKPEOF"
#!/bin/bash
D=$(date +%Y%m%d_%H%M%S)
F="/opt/cuonghoangdev/backups/${D}_backup.sql.gz"
if docker exec cuonghoangdev_postgres psql -U postgres -lqt | cut -d"|" -f1 | grep -qw cuonghoangdev_db 2>/dev/null; then
  docker exec cuonghoangdev_postgres pg_dump -U postgres cuonghoangdev_db | gzip > "$F"
  echo "[$(date)] Backup: $F ($(du -h "$F" 2>/dev/null | cut -f1 || echo "unknown"))"
  find /opt/cuonghoangdev/backups -name "*.sql.gz" -type f -mtime +30 -delete
else
  echo "[$(date)] Database not found, skipping backup"
fi
BKPEOF
            chmod +x /opt/cuonghoangdev/scripts/backup-cron.sh

            # Create restore script
            cat > /opt/cuonghoangdev/scripts/restore-db.sh << "RESTEOF"
#!/bin/bash
BACKUP_DIR="/opt/cuonghoangdev/backups"
if [ -z "$1" ]; then echo "Usage: $0 <backup_filename>"; ls "$BACKUP_DIR"/*.sql.gz 2>/dev/null; exit 1; fi
F="$BACKUP_DIR/$1"
if [ ! -f "$F" ]; then echo "Not found: $F"; exit 1; fi
echo "WARNING: This will overwrite the current database!"
read -p "Continue? (yes/no): " C
[ "$C" != "yes" ] && exit 0
echo "Restoring from $F..."
docker exec -i cuonghoangdev_postgres psql -U postgres -c "SELECT pg_terminate_backend(pg_stat_activity.pid) FROM pg_stat_activity WHERE datname='"'"'cuonghoangdev_db'"'"' AND pid <> pg_backend_pid();" 2>/dev/null || true
docker exec -i cuonghoangdev_postgres psql -U postgres -c "DROP DATABASE IF EXISTS cuonghoangdev_db; CREATE DATABASE cuonghoangdev_db;"
gunzip -c "$F" | docker exec -i cuonghoangdev_postgres psql -U postgres cuonghoangdev_db
echo "Restored!"
RESTEOF
            chmod +x /opt/cuonghoangdev/scripts/restore-db.sh

            # Setup cron (backup daily at 2 AM)
            (crontab -l 2>/dev/null | grep -v backup-cron; echo "0 2 * * * /opt/cuonghoangdev/scripts/backup-cron.sh >> /var/log/backup-cron.log 2>&1") | crontab -
            
            echo "Cron setup done. Current crontab:"
            crontab -l
          '
